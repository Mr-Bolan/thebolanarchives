name: Sync archive annotation discussions

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "content/**/*.mdx"
      - "content/annotation-discussions.json"
      - ".github/DISCUSSION_TEMPLATE/archive-annotations.yml"
      - ".github/workflows/archive-discussions-sync.yml"
      - "scripts/archive-discussions.mjs"

permissions:
  contents: write
  discussions: write
  pull-requests: write

jobs:
  sync:
    name: Ensure per-record discussions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Self-check discussion tooling
        run: npm run discussions:self-check

      - name: Sync archive discussions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run discussions:sync

      - name: Detect registry change
        id: diff
        run: |
          if git diff --quiet -- content/annotation-discussions.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open registry sync pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="archive-discussions-sync-${GITHUB_RUN_ID}"
          git checkout -B "$branch"
          git add content/annotation-discussions.json
          git commit -m "add site feature: sync archive discussions"
          git push --force-with-lease origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "sync archive annotation discussions" \
            --body "Updates the static archive discussion registry after ensuring each published or unlisted archive record has a GitHub Discussion thread."
