# Archive annotation intake — MANUAL FALLBACK ONLY.
#
# The Blackbox Garden orchestrator loop now owns annotation intake. On each tick, stage 50
# (garden/stages/50_annotations) runs discussions:sync + discussions:export, the
# auto-moderation skill approves screen_clear notes, and stage 40 commits the approved
# content/annotations/*.json straight to main so the next deploy renders them. There is one
# loop, driven by significance, not a fixed timer.
#
# The */30 cron and discussion/comment event triggers were removed so this workflow does not
# compete with the orchestrator or keep regenerating an unmerged PR (the reason approved
# notes never reached the live site). This workflow remains only as a manual, PR-based
# fallback you can dispatch by hand if the loop is paused.
name: Screen archive annotation intake (manual fallback)

on:
  workflow_dispatch:

permissions:
  contents: write
  discussions: write
  pull-requests: write

concurrency:
  group: archive-intake-screener
  cancel-in-progress: false

jobs:
  screen:
    name: Screen and export clear notes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Continue existing export branch
        run: |
          branch="archive-intake-screen"
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Self-check discussion tooling
        run: npm run discussions:self-check

      - name: Ensure discussion registry
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run discussions:sync

      - name: Export clear notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run discussions:export

      - name: Audit exported annotations
        run: npm run annotations:audit

      - name: Detect generated changes
        id: diff
        run: |
          if git diff --quiet -- content/annotation-discussions.json content/annotations; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open screened annotation pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="archive-intake-screen"
          git checkout -B "$branch"
          git add content/annotation-discussions.json content/annotations
          git commit -m "add site feature: export screened annotations"
          git push --force-with-lease origin "$branch"
          existing_pr="$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            echo "Updated existing PR #$existing_pr"
          else
            gh pr create \
              --base main \
              --head "$branch" \
              --title "export screened archive annotations" \
              --body "Exports GitHub Discussion comments that passed the rules-based archive intake screener into static annotation JSON. Comments that need review or are blocked remain in GitHub and are not rendered on the archive."
          fi
